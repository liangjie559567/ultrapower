name: Documentation Sync Check

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  docs-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run documentation sync checks
        run: node .github/scripts/check-docs-sync.cjs
