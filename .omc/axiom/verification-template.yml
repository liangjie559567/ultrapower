# Verification Template

## 问题类型验证清单

### 1. API 类型问题

**验证步骤**:
- [ ] TypeScript 编译：`tsc --noEmit`
- [ ] 构建成功：`npm run build`
- [ ] 类型测试通过：检查相关 `.test.ts` 文件
- [ ] API 契约一致：所有实现符合接口定义

**成功标准**: 零类型错误，所有工具实现兼容

---

### 2. 安全问题

**验证步骤**:
- [ ] 添加攻击测试用例（路径遍历、命令注入、XSS 等）
- [ ] 运行现有测试套件：`npm test`
- [ ] 手动验证边界情况（空输入、特殊字符、超长输入）
- [ ] 更新安全文档：`docs/standards/runtime-protection.md`

**成功标准**: 攻击测试失败（被正确阻止），无回归

---

### 3. 内存泄漏问题

**验证步骤**:
- [ ] 添加重复调用测试（同一 ID 多次调用）
- [ ] 添加并发测试（多个 ID 同时调用）
- [ ] 添加清理验证（资源正确释放）
- [ ] 长时间运行测试（24 小时无内存增长）

**成功标准**: 无内存泄漏，清理逻辑正确执行

---

### 4. 性能问题

**验证步骤**:
- [ ] 基准测试：记录修复前后性能指标
- [ ] 负载测试：高并发场景验证
- [ ] 性能分析：使用 profiler 确认优化生效
- [ ] 回归测试：确保无性能退化

**成功标准**: 达到预期性能提升目标（如 40-60%）

---

### 5. 代码质量问题

**验证步骤**:
- [ ] Lint 检查：`npm run lint`
- [ ] 代码覆盖率：`npm run test:coverage`
- [ ] 代码重复检查：SonarQube 或类似工具
- [ ] 代码审查：至少 1 人审查

**成功标准**: Lint 通过，覆盖率维持或提升

---

## 通用验证流程

### 阶段 1: 本地验证
```bash
tsc --noEmit
npm run build
npm test
```

### 阶段 2: 集成验证
```bash
npm run test:integration
npm run test:e2e
```

### 阶段 3: 回归验证
- 运行完整测试套件
- 检查所有现有功能正常
- 验证无破坏性变更

